<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anton Barinov - PHP developer building TropaTT</title>
  <desc id="desc">A dark green GitHub profile banner for Anton Barinov, PHP developer and creator of TropaTT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071512"/>
      <stop offset="0.55" stop-color="#10231f"/>
      <stop offset="1" stop-color="#173d35"/>
    </linearGradient>
    <linearGradient id="accent" x1="165" y1="73" x2="1036" y2="288" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EE3C8"/>
      <stop offset="1" stop-color="#38B48F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <g opacity="0.22">
    <path d="M0 76H1200" stroke="#A7F3D0"/>
    <path d="M0 144H1200" stroke="#A7F3D0"/>
    <path d="M0 212H1200" stroke="#A7F3D0"/>
    <path d="M0 280H1200" stroke="#A7F3D0"/>
    <path d="M120 0V360" stroke="#A7F3D0"/>
    <path d="M260 0V360" stroke="#A7F3D0"/>
    <path d="M400 0V360" stroke="#A7F3D0"/>
    <path d="M540 0V360" stroke="#A7F3D0"/>
    <path d="M680 0V360" stroke="#A7F3D0"/>
    <path d="M820 0V360" stroke="#A7F3D0"/>
    <path d="M960 0V360" stroke="#A7F3D0"/>
    <path d="M1100 0V360" stroke="#A7F3D0"/>
  </g>

  <circle cx="1052" cy="54" r="118" fill="#38B48F" opacity="0.18" filter="url(#soft)"/>
  <circle cx="202" cy="308" r="142" fill="#8EE3C8" opacity="0.12" filter="url(#soft)"/>

  <g transform="translate(78 70)">
    <rect x="0" y="0" width="88" height="88" rx="24" fill="#E8FFF7" opacity="0.96"/>
    <rect x="18" y="19" width="25" height="25" rx="7" fill="#38B48F"/>
    <rect x="43" y="44" width="27" height="27" rx="8" fill="#10231F"/>
    <rect x="18" y="58" width="30" height="12" rx="6" fill="#8EE3C8"/>
  </g>

  <text x="190" y="116" fill="#F7FFFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800" letter-spacing="0">
    Anton Barinov
  </text>
  <text x="192" y="160" fill="#BFEBDD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="500">
    PHP developer building self-hosted CRM, task management and AI-assisted work platforms
  </text>

  <g transform="translate(192 205)" fill="none" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">
    <rect x="0" y="0" width="112" height="42" rx="21" fill="#E8FFF7"/>
    <text x="24" y="27" fill="#0D1F1B">PHP 8.1+</text>
    <rect x="128" y="0" width="96" height="42" rx="21" fill="#E8FFF7"/>
    <text x="154" y="27" fill="#0D1F1B">MySQL</text>
    <rect x="240" y="0" width="105" height="42" rx="21" fill="#E8FFF7"/>
    <text x="264" y="27" fill="#0D1F1B">REST API</text>
    <rect x="361" y="0" width="116" height="42" rx="21" fill="#E8FFF7"/>
    <text x="385" y="27" fill="#0D1F1B">OpenAPI</text>
    <rect x="493" y="0" width="147" height="42" rx="21" fill="url(#accent)"/>
    <text x="518" y="27" fill="#071512">Self-hosted</text>
  </g>

  <g transform="translate(815 90)">
    <rect width="270" height="154" rx="24" fill="#E8FFF7" opacity="0.96"/>
    <text x="28" y="44" fill="#0D1F1B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800">TropaTT</text>
    <text x="28" y="78" fill="#31554B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="600">CRM + tasks + projects</text>
    <text x="28" y="106" fill="#31554B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="600">team chat + automation</text>
    <path d="M30 126H238" stroke="#38B48F" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>

<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anton Barinov - PHP and OpenCart developer building TropaTT</title>
  <desc id="desc">A clean professional GitHub profile banner for Anton Barinov, PHP and OpenCart developer since 2009 and creator of TropaTT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081412"/>
      <stop offset="0.58" stop-color="#10231F"/>
      <stop offset="1" stop-color="#0F3A31"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="262" x2="1104" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38B48F" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#38B48F" stop-opacity="0.9"/>
      <stop offset="0.78" stop-color="#8EE3C8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8EE3C8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <path d="M96 262H1104" stroke="url(#accent)" stroke-width="2"/>

  <g opacity="0.10">
    <path d="M96 74H1104" stroke="#D8FFF3"/>
    <path d="M96 286H1104" stroke="#D8FFF3"/>
    <path d="M96 74V286" stroke="#D8FFF3"/>
    <path d="M1104 74V286" stroke="#D8FFF3"/>
  </g>

  <text x="94" y="122" fill="#8EE3C8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" letter-spacing="3">
    PHP / MYSQL / OPENCART / CRM
  </text>
  <text x="94" y="181" fill="#F7FFFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="62" font-weight="850" letter-spacing="0">
    Anton Barinov
  </text>
  <text x="96" y="225" fill="#DDFBF2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="600">
    CRM, online stores, integrations and self-hosted business platforms
  </text>

  <g transform="translate(96 294)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="750">
    <rect x="0" y="0" width="118" height="38" rx="19" fill="#EFFFF9"/>
    <text x="24" y="25" fill="#10231F">Since 2009</text>
    <rect x="134" y="0" width="118" height="38" rx="19" fill="#EFFFF9"/>
    <text x="157" y="25" fill="#10231F">OpenCart</text>
    <rect x="268" y="0" width="86" height="38" rx="19" fill="#EFFFF9"/>
    <text x="290" y="25" fill="#10231F">CRM</text>
    <rect x="370" y="0" width="130" height="38" rx="19" fill="#EFFFF9"/>
    <text x="394" y="25" fill="#10231F">Integration</text>
    <rect x="516" y="0" width="112" height="38" rx="19" fill="#38B48F"/>
    <text x="538" y="25" fill="#071512">TropaTT</text>
  </g>

  <text x="996" y="114" fill="#8EE3C8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="850" opacity="0.16">
